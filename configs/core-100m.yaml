project:
  name: aletheia-mu
  data_dir: ./data
  checkpoint_dir: ./checkpoints
  memory_db: ./data/memory.sqlite

model:
  name: core-100m
  vocab_size: 512
  context_length: 1024
  n_layers: 12
  n_heads: 12
  d_model: 768
  d_ff: 3072
  dropout: 0.0
  rope: true
  norm: rmsnorm
  activation: swiglu
  seed: 17

training:
  batch_size: 8
  learning_rate: 0.0002
  weight_decay: 0.01
  max_steps: 50000
  grad_clip: 1.0
  checkpoint_every: 1000
  eval_every: 500

inference:
  temperature: 0.2
  top_k: 32
  top_p: 0.95
  max_tokens: 512

search:
  strategy: beam
  beam_width: 4
  max_depth: 8
  budget_seconds: 120
  budget_tool_calls: 50

verifiers:
  go_test:
    enabled: true
    command: "go test ./..."
    timeout_seconds: 60
  go_vet:
    enabled: true
    command: "go vet ./..."
    timeout_seconds: 60
  fuzz:
    enabled: false
    command: "go test -run ^$ -fuzz Fuzz -fuzztime 1s ./..."
    timeout_seconds: 20
  bench:
    enabled: false
    command: "go test -bench . ./..."
    timeout_seconds: 20

memory:
  chunk_size: 1200
  chunk_overlap: 200
  max_file_bytes: 524288
  embedding: hashing
  graph_enabled: true
