project:
  name: aletheia-mu
  data_dir: ./data
  checkpoint_dir: ./checkpoints
  memory_db: ./data/memory.sqlite

model:
  name: seed-10m
  vocab_size: 512
  context_length: 512
  n_layers: 4
  n_heads: 4
  d_model: 256
  d_ff: 1024
  dropout: 0.0
  rope: true
  norm: rmsnorm
  activation: swiglu

training:
  batch_size: 16
  learning_rate: 0.0003
  weight_decay: 0.01
  max_steps: 10000
  grad_clip: 1.0
  checkpoint_every: 500
  eval_every: 250

inference:
  temperature: 0.2
  top_k: 16
  top_p: 0.95
  max_tokens: 512

search:
  strategy: beam
  beam_width: 4
  max_depth: 8
  budget_seconds: 120
  budget_tool_calls: 50

verifiers:
  go_test:
    enabled: true
    command: "go test ./..."
    timeout_seconds: 60
  go_vet:
    enabled: true
    command: "go vet ./..."
    timeout_seconds: 60
  fuzz:
    enabled: false
    command: "go test -run ^$ -fuzz Fuzz -fuzztime 1s ./..."
    timeout_seconds: 20
  bench:
    enabled: false
    command: "go test -bench . ./..."
    timeout_seconds: 20

memory:
  chunk_size: 1200
  chunk_overlap: 200
  max_file_bytes: 524288
  embedding: hashing
  graph_enabled: true

research:
  enabled: false
  auto_on_knowledge_gap: false
  background_jobs_enabled: true
  provider: searxng
  searxng_url: "http://searxng:8080"
  max_sources: 5
  max_fetch_bytes: 1048576
  fetch_timeout_seconds: 10
  job_timeout_seconds: 120
  min_sources_for_verified: 2
  min_trust_score: 0.35
  user_agent: "AletheiaResearchBot/0.1"
  blocked_domains:
    - "facebook.com"
    - "instagram.com"
    - "tiktok.com"
    - "x.com"
    - "twitter.com"
  allowed_domains: []
