project:
  name: aletheia-mu
  data_dir: ./data
  checkpoint_dir: ./checkpoints
  memory_db: ./data/memory.sqlite

model:
  name: seed-10m
  vocab_size: 512
  context_length: 512
  n_layers: 4
  n_heads: 4
  d_model: 256
  d_ff: 1024
  dropout: 0.0
  rope: true
  norm: rmsnorm
  activation: swiglu
  seed: 11

training:
  batch_size: 16
  learning_rate: 0.0003
  weight_decay: 0.01
  max_steps: 10000
  grad_clip: 1.0
  checkpoint_every: 500
  eval_every: 250

inference:
  temperature: 0.2
  top_k: 16
  top_p: 0.95
  max_tokens: 512

